name: Build and Package Focus App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'oracle'
          cache: 'maven'

      # Required for building .exe with jpackage on Windows
      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Build and Package with Maven
        run: ./mvnw clean package jpackage:jpackage -DskipTests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusTool-Windows
          path: target/installer/*.exe
